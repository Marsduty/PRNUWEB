# ============================================
# 生产环境扩展配置
# 使用方式（首次部署）：
#   1. 复制 nginx.conf.example 为 nginx.conf，并把 your-domain.com 改为实际域名
#   2. 复制 .env.prod.example 为 .env.prod，并修改密码、域名等配置
#   2. 申请 SSL 证书：
#      docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml run --rm certbot \
#        certonly --webroot -w /var/www/certbot \
#        -d your-domain.com -d www.your-domain.com \
#        --email your-email@example.com --agree-tos --non-interactive
#   3. 启动全部服务：
#      docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # Certbot - 自动申请/续签 SSL 证书
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: ""
    command: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    restart: unless-stopped

  # 后端 - 不暴露公网端口，仅内网可访问（CORS 等环境变量沿用基础文件 + .env.prod）
  backend:
    ports: !reset []
    expose:
      - "8000"

  # 前端 - 不暴露公网端口，仅内网可访问（生产构建）
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    environment: !reset
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    ports: !reset []
    expose:
      - "3000"

  # 数据库 - 不暴露公网端口
  postgres:
    ports: !reset []
    expose:
      - "5432"

  # Redis - 不暴露公网端口
  redis:
    ports: !reset []
    expose:
      - "6379"

  # MinIO - 不暴露公网端口，仅供后端和 worker 通过 Docker 内网访问
  minio:
    ports: !reset []
    expose:
      - "9000"


volumes:
  certbot-webroot:
